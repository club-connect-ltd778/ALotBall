name: Android CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.13-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          GRADLE_HOME=$(ls -d /tmp/gradle-*)
          echo "$GRADLE_HOME/bin" >> $GITHUB_PATH
          echo "GRADLE_HOME=$GRADLE_HOME" >> $GITHUB_ENV

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build and Sign Release APK with Fastlane
        working-directory: .
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bundle exec fastlane build_apk

      - name: Build and Sign Release AAB with Fastlane
        working-directory: .
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bundle exec fastlane build_aab

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Build Summary
        run: |
          echo "## Build completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts available for download:" >> $GITHUB_STEP_SUMMARY
          echo "- **Release APK**: Check Actions -> Artifacts -> release-apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Release AAB**: Check Actions -> Artifacts -> release-aab" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### File locations:" >> $GITHUB_STEP_SUMMARY
          echo "- APK: \`app/build/outputs/apk/release/\`" >> $GITHUB_STEP_SUMMARY
          echo "- AAB: \`app/build/outputs/bundle/release/\`" >> $GITHUB_STEP_SUMMARY